<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeNest App</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f7fa;
      text-align: center;
      color: #333;
    }

    header {
      padding: 40px 20px;
      background: linear-gradient(135deg, #0066ff, #00c2ff);
      color: white;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p.subtitle {
      font-size: 18px;
      opacity: 0.9;
    }

    .download-buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: #0066ff;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
      margin: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .content {
      padding: 50px 20px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: #eee;
    }
  </style>

</head>
<body>

<header>
  <h1>TimeNest</h1>
  <p class="subtitle">Smart Time Management App for Your Daily Tasks</p>

  <div class="download-buttons">
    <a class="btn" href="#">Download Android App</a>
  </div>
</header>

<div class="content">
  <h2>Why TimeNest?</h2>
  <p>Easy schedules, reminders, task tracking and more.</p>
</div>

<footer>
  © 2025 TimeNest. All Rights Reserved.
</footer>

</body>
</html>
